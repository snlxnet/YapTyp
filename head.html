<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>YapTyp Player</title>
  <style>
    * {
      margin: 0;
      padding: 0;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: black;
    }
    svg {
      width: 100vw;
      height: unset;
      display: none;
    }
    svg.visible {
      display: block;
    }
    @media (min-aspect-ratio: 16/9) {
      svg {
        width: unset;
        height: 100dvh;
      }
    }
    video {
      width: 100%;
      height: 100%;
    }
    .highlight {
      color: #fab387;
    }
    #sidebar {
      display: grid;
      grid-template-rows: 1fr auto;
      height: 100dvh;
      max-width: 50ch;
    }
    #notes, #timer {
      overflow-y: auto;
      padding: 1rem;
      &:empty {
        padding: 0rem;
      }
    }
  </style>
</head>
<body>
<div id="sidebar">
  <main id="notes"></main>
  <div id="timer"></div>
</div>
