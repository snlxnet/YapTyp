<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>YapTyp Player</title>
  <link rel="stylesheet" href="theme.css">
  <style>
    * {
      margin: 0;
      padding: 0;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: var(--slide-bg);
    }
    svg {
      width: 100vw;
      height: unset;
      display: none;
    }
    svg.visible {
      display: block;
    }
    @media (min-aspect-ratio: 16/9) {
      svg {
        width: unset;
        height: 100dvh;
      }
    }
    video {
      width: 100%;
      height: 100%;
    }
    #sidebar {
      box-sizing: border-box;
      grid-template-rows: 1fr auto;
      height: 100dvh;
      max-width: 50ch;
      font: var(--font);
      color: var(--notes-fg);
      display: none;
      padding: 1em;
      gap: 1em;
      &:has(#notes:not(:empty)) {
        display: grid;
      }
    }
    #notes {
      overflow-y: auto;
      scrollbar-color: var(--notes-focus) transparent;
      padding: 1rem;
      background: var(--notes-bg);
      border-radius: var(--notes-radius);
      &:empty { padding: 0rem; }
      .highlight { color: var(--notes-focus); }
      a { color: var(--notes-link); }
      em { color: var(--notes-em); }
      strong { color: var(--notes-strong); }
      p { margin: 1em 0; }
    }
    body:has(#notes:not(:empty)) {
      padding-right: 1em;
    }
    @media (max-width: 90ch) {
      body:has(#notes:not(:empty)) {
        &>svg {
          display: none;
        }
        #sidebar {
          max-width: unset;
        }
      }
    }
    #controls {
      font-size: 2em;
      color: var(--timer-fg);
      background: var(--timer-bg);
      padding: 1rem;
      border-radius: var(--notes-radius);
      display: flex;
      justify-content: space-between;
      gap: 1em;
      & div {
        display: flex;
        gap: 1em;
      }
      & button {
        border: none;
        background: transparent;
      }
      & svg {
        width: 2rem;
        height: 2rem;
        display: block;
        stroke: var(--timer-fg);
      }
    }
  </style>
</head>
<body>
<div id="sidebar">
  <main id="notes"></main>
  <div id="controls">
    <button id="prev">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-arrow-left-icon lucide-arrow-left"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
    </button>

    <span id="timer"></span>

    <div>
      <button id="full">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-fullscreen-icon lucide-fullscreen"><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/><rect width="10" height="8" x="7" y="8" rx="1"/></svg>
      </button>
      <button id="next">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-arrow-right-icon lucide-arrow-right"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
      </button>
    </div>
  </div>
</div>
