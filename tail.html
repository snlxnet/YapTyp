<script>
const slides = document.querySelectorAll(".typst-doc")
let currentSlide = 0
showSlide(0)
createVideos()

document.addEventListener("keydown", (event) => {
    const actions = {
        ArrowRight: nextSlide,
        ArrowDown: nextSlide,
        ArrowLeft: prevSlide,
        ArrowUp: prevSlide,
        Home: firstSlide,
        End: lastSlide,
    }

    actions[event.key]()
})

function firstSlide() { showSlide(0) }
function lastSlide() { showSlide(slides.length - 1) }

function nextSlide() {
    if (currentSlide + 1 === slides.length) {
        firstSlide()
    } else {
        showSlide(currentSlide + 1)
    }
}

function prevSlide() {
    if (currentSlide === 0) {
        lastSlide()
    } else {
        showSlide(currentSlide - 1)
    }
}

function showSlide(idx) {
    currentSlide = idx
    slides.forEach((slide, currentIdx) => {
        if (currentIdx !== idx) {
            slide.classList.add("hidden")
        } else {
            slide.classList.remove("hidden")
        }
    })
    document.dispatchEvent(new Event("slideswitched"))
}

function createVideos() {
    Array.from(document.querySelectorAll("[data-typst-label]"))
        .filter(element => element.dataset.typstLabel)
        .map(anchor => {
            const video = document.createElement("video")
            video.src = "./" + anchor.dataset.typstLabel
            video.loop = true
            updateGeometry(video, anchor)
            document.body.appendChild(video)
            document.addEventListener("slideswitched", () => {
                updateGeometry(video, anchor)
                handlePlayback(video)
            })
        })
}

function updateGeometry(video, anchor) {
    const { x, y, width, height } = anchor.getBoundingClientRect()
    video.style.left = x + 'px'
    video.style.top = y + 'px'
    video.style.width = width + 'px'
    video.style.height = height + 'px'
}

function handlePlayback(video) {
    if (video.style.width === 0 || video.style.height === 0) {
        video.pause()
        return
    }

    video.currentTime = 0
    video.play()
}
</script>
</body>
</html>
