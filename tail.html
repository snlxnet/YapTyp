<script>
const slides = document.querySelectorAll("body>svg")
let lastIntervalId = 0

const channel = new BroadcastChannel("control")
channel.addEventListener("message", ({data: idx}) => showSlide(idx, true))

const parent = document.getElementById("notes")
Array.from(slides)
    .map(findNotes)
    .map(wrapNotes)
    .forEach(el => parent.appendChild(el))
const timer = document.getElementById("timer")

let currentSlide = 0
showSlide(currentSlide)
createVideos()

function findNotes(parent) {
    return Array.from(parent.querySelectorAll("[data-typst-label]"))
        .filter(element => element.dataset.typstLabel)
        .filter(element => element.dataset.typstLabel.startsWith("note://"))
        .map(element => element.dataset.typstLabel.replace("note://", ""))
        .join("\n")
}

function wrapNotes(note, slideIdx) {
    const container = document.createElement("div")
    container.innerHTML = note
    const heading = document.createElement("h2")
    heading.textContent = "Slide " + slideIdx
    heading.id = "notes" + slideIdx
    heading.classList.add("note-title")
    container.prepend(heading)
    return container
}

document.querySelectorAll("a").forEach(el => el.addEventListener("click", (event) => {
    event.stopPropagation()
}))
document.getElementById("full").onclick = fullscreen
document.getElementById("next").onclick = nextSlide
document.getElementById("prev").onclick = prevSlide
document.addEventListener("keydown", (event) => {
    const actions = {
        ArrowRight: nextSlide,
        ArrowDown: nextSlide,
        ArrowLeft: prevSlide,
        ArrowUp: prevSlide,
        Home: firstSlide,
        End: lastSlide,
        f: fullscreen,
    }

    actions[event.key]()
})

function fullscreen() {
    document.body.requestFullscreen()
    document.getElementById("notes").innerHTML = ""
    firstSlide()
}

function firstSlide() { showSlide(0) }
function lastSlide() { showSlide(slides.length - 1) }

function nextSlide() {
    if (currentSlide + 1 === slides.length) {
        firstSlide()
    } else {
        showSlide(currentSlide + 1)
    }
}

function prevSlide() {
    if (currentSlide === 0) {
        lastSlide()
    } else {
        showSlide(currentSlide - 1)
    }
}

function showSlide(idx, quiet = false) {
    if (idx === 0) {
        createTimer()
    }

    document.querySelectorAll(".note-title").forEach(el => el.classList.remove("highlight"))
    document.getElementById("notes"+idx)?.classList.add("highlight")
    console.log("notes"+idx, document.getElementById("notes"+idx))
    currentSlide = idx
    slides.forEach((slide, currentIdx) => {
        let videos = Array.from(slide.querySelectorAll("video"))
        if (currentIdx !== idx) {
            slide.classList.remove("visible")
            videos.forEach(video => {
                video.pause()
                requestAnimationFrame(() => video.currentTime = 0)
            })
        } else {
            slide.classList.add("visible")
            videos.forEach(video => video.play())
        }
    })
    if (!quiet) {
        channel.postMessage(idx)
    }
    document.dispatchEvent(new Event("slideswitched"))
}

function createVideos() {
    Array.from(document.querySelectorAll("[data-typst-label]"))
        .filter(element => element.dataset.typstLabel)
        .map(anchor => {
            const video = document.createElement("video")
            const image = anchor.querySelector("image")
            if (!image) {
                return // this is either a note or a user's label
            }
            const src = anchor.dataset.typstLabel
            video.src = src.startsWith("http") ? src : "./" + src
            video.loop = true
            video.preload = "auto"
            image.appendChild(video)
            image.outerHTML = `<foreignObject width="${image.attributes.width.value}" height="${image.attributes.height.value}">` + image.innerHTML + `</foreignObject>`
        })
}

function updateGeometry(video, anchor) {
    const { x, y, width, height } = anchor.getBoundingClientRect()
    video.style.left = x + 'px'
    video.style.top = y + 'px'
    video.style.width = width + 'px'
    video.style.height = height + 'px'
}

function createTimer() {
    const started = new Date()
    const timer = document.getElementById("timer")

    clearInterval(lastIntervalId)
    timer.textContent = "00:00"

    lastIntervalId = setInterval(() => {
        const seconds = (new Date() - started) / 1000
        timer.textContent = prettifyNumber(seconds / 60) + ":" + prettifyNumber(seconds % 60)
    }, 1000)
}

function prettifyNumber(x) {
    if (x > 100) {
        return Math.floor(x)
    }

    return ('00' + Math.floor(x)).slice(-2)
}
</script>
</body>
</html>
